<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>School Pro</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#0b1120">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('school_pro_theme') || 'system';
        var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        var scale = localStorage.getItem('school_pro_font_scale') || 'normal';
        document.documentElement.style.fontSize = scale === 'xlarge' ? '125%' : scale === 'large' ? '112.5%' : '100%';
        var locale = localStorage.getItem('school_pro_locale');
        if (locale === 'en' || locale === 'sn' || locale === 'fr') {
          document.documentElement.lang = locale;
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
