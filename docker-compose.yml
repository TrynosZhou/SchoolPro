services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolpro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: schoolpro
    ports:
      - "5432:5432"
    volumes:
      - schoolpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schoolpro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  schoolpro_pgdata:
